<!DOCTYPE html>
<html>
<head>
    <title>Student Result Calculator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f0f0f0;
        }
        .container {
            margin-top: 50px;
            padding: 20px;
            background: white;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        button {
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
        input {
            padding: 5px;
            margin: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Result Calculator</h2>

    <label>Enter number of subjects:</label><br>
    <input type="number" id="subjects"><br>

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
</div>

<script>
function calculate() {
    let n = document.getElementById("subjects").value;
    let total = 0;

    for (let i = 1; i <= n; i++) {
        let marks = parseFloat(prompt("Enter marks for subject " + i));
        total += marks;
    }

    let average = total / n;
    let grade;
    let status;

    // Grade logic
    if (average >= 90) grade = "A+";
    else if (average >= 75) grade = "A";
    else if (average >= 60) grade = "B";
    else if (average >= 50) grade = "C";
    else grade = "F";

    // Pass/Fail
    if (average >= 40) status = "Pass";
    else status = "Fail";

    // Display result
    document.getElementById("result").innerHTML = `
        <h3>Total Marks: ${total}</h3>
        <h3>Average: ${average.toFixed(2)}</h3>
        <h3>Grade: ${grade}</h3>
        <h3>Status: ${status}</h3>
    `;
}
</script>

</body>
</html>
