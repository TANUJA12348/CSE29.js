<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Lab</title>
    <style>
        body {
            font-family: Arial;
            background: #eaeaea;
            text-align: center;
        }

        .container {
            width: 500px;
            margin: 80px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        p {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container" id="box">
    <h2 id="heading">Welcome to JavaScript Lab</h2>

    <input type="text" id="inputText" placeholder="Enter new heading text">

    <br>

    <button onclick="changeHeading()">Change Heading</button>
    <button onclick="changeBackground()">Change Background</button>
    <button onclick="increaseFont()">Increase Font Size</button>
    <br>
    <button onclick="togglePara()">Show/Hide Paragraph</button>
    <button onclick="resetAll()">Reset</button>

    <p id="para">
        This is a sample paragraph. JavaScript events can dynamically change content.
    </p>
</div>

<script>
    let fontSize = 20;

    function changeHeading() {
        let text = document.getElementById("inputText").value;
        document.getElementById("heading").innerText = text;
    }

    function changeBackground() {
        let colors = ["lightblue", "lightgreen", "lightpink", "lightyellow"];
        let random = colors[Math.floor(Math.random() * colors.length)];
        document.getElementById("box").style.background = random;
    }

    function increaseFont() {
        fontSize += 2;
        document.getElementById("para").style.fontSize = fontSize + "px";
    }

    function togglePara() {
        let para = document.getElementById("para");
        if (para.style.display === "none") {
            para.style.display = "block";
        } else {
            para.style.display = "none";
        }
    }

    function resetAll() {
        document.getElementById("heading").innerText = "Welcome to JavaScript Lab";
        document.getElementById("para").style.display = "block";
        document.getElementById("para").style.fontSize = "16px";
        document.getElementById("box").style.background = "white";
        document.getElementById("inputText").value = "";
        fontSize = 20;
    }
</script>

</body>
</html>
