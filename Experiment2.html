<!DOCTYPE html>
<html>
<head>
    <title>Employee Management</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }
        input, button {
            margin: 5px;
            padding: 8px;
        }
        #output {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h2>Employee Management System</h2>

<!-- Input Fields -->
<input type="text" id="name" placeholder="Employee Name">
<input type="number" id="id" placeholder="Employee ID">
<input type="number" id="salary" placeholder="Salary">
<input type="text" id="dept" placeholder="Department">

<br>

<button onclick="addEmployee()">Add Employee</button>
<button onclick="displayEmployees()">Display All</button>
<button onclick="filterSalary()">Salary > 50000</button>
<button onclick="totalSalary()">Total Salary</button>
<button onclick="averageSalary()">Average Salary</button>
<button onclick="countDept()">Count by Dept</button>

<div id="output"></div>

<script>
    let employees = [];

    function addEmployee() {
        let emp = {
            name: document.getElementById("name").value,
            id: document.getElementById("id").value,
            salary: Number(document.getElementById("salary").value),
            dept: document.getElementById("dept").value
        };

        employees.push(emp);
        alert("Employee Added!");
    }

    function displayEmployees() {
        let result = "";
        for (let emp of employees) {
            result += `Name: ${emp.name}, ID: ${emp.id}, Salary: ₹${emp.salary}, Dept: ${emp.dept} <br>`;
        }
        document.getElementById("output").innerHTML = result;
    }

    function filterSalary() {
        let filtered = employees.filter(emp => emp.salary > 50000);
        let result = "";

        filtered.forEach(emp => {
            result += `Name: ${emp.name}, Salary: ₹${emp.salary} <br>`;
        });

        document.getElementById("output").innerHTML = result;
    }

    function totalSalary() {
        let total = 0;
        for (let emp of employees) {
            total += emp.salary;
        }
        document.getElementById("output").innerHTML = "Total Salary: ₹" + total;
    }

    function averageSalary() {
        let total = 0;
        for (let emp of employees) {
            total += emp.salary;
        }
        let avg = employees.length ? (total / employees.length) : 0;

        document.getElementById("output").innerHTML = "Average Salary: ₹" + avg;
    }

    function countDept() {
        let deptInput = prompt("Enter Department:");
        let count = 0;

        for (let emp of employees) {
            if (emp.dept === deptInput) {
                count++;
            }
        }

        document.getElementById("output").innerHTML = 
            `Employees in ${deptInput}: ${count}`;
    }
</script>

</body>
</html>
